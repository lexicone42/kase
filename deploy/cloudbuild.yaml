steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/kase:$COMMIT_SHA
      - -f
      - deploy/Dockerfile
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/kase:$COMMIT_SHA

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - kase
      - --image=gcr.io/$PROJECT_ID/kase:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --no-allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/kase:$COMMIT_SHA
