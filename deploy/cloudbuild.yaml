steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/kase/kase:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/kase/kase:latest
      - -f
      - deploy/Dockerfile
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/kase/kase:$COMMIT_SHA

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/kase/kase:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - kase
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/kase/kase:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --no-allow-unauthenticated
      - --service-account=kase-api@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,KASE_STORE=firestore
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=2

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/kase/kase:$COMMIT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/kase/kase:latest
